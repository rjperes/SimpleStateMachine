name: Build and Test

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore SimpleStateMachine.slnx

    - name: Build
      run: dotnet build SimpleStateMachine.slnx --no-restore

    - name: Run tests
      run: dotnet test SimpleStateMachine.slnx --no-build --verbosity normal
